name: Java CI Pipeline (Gradle)

# Se ejecuta al hacer push o pull request a main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repo
      - name: Checkout código
        uses: actions/checkout@v3

      # 2️⃣ Configurar Java
      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Cache para dependencias de Gradle (acelera builds)
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4️⃣ Compilar proyecto
      - name: Compilar con Gradle
        run: ./gradlew build -x test

      # 5️⃣ Ejecutar tests
      - name: Ejecutar tests
        run: ./gradlew test

      # 6️⃣ Mensaje de finalización
      - name: Build completo
        run: echo "Build y tests completados correctamente ✅"